    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fafafa; overflow: hidden; }
    
    #header {
      width: 100%; height: 70px; background: #0d1251; 
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: absolute; top: 0; left: 0; z-index: 10;
      border-bottom: 4px solid #e31e24; box-sizing: border-box;
    }
    #header .logo-container { height: 55px; display: flex; align-items: center; }
    #header .logo-container img { height: 100%; width: auto; }
    #header h2 { margin: 0; color: white; font-weight: 600; font-size: 22px; text-transform: uppercase; letter-spacing: 1.5px; }

    .node rect { fill: #0d1251; rx: 4; transition: all 0.3s; cursor: pointer; }
    .node:hover rect { fill: #1a237e; filter: brightness(1.2); }
    .node.node--collapsed rect { stroke: #ffcc00; stroke-width: 3px; }
    
    .node.node--staff rect { fill: #ffffff !important; stroke: #0d1251; stroke-width: 2px; }
    .node.node--staff text { fill: #0d1251 !important; font-weight: 700; }

    .node text { fill: white; text-anchor: middle; font-weight: 500; pointer-events: none; font-size: 10px; }
    
    .link { fill: none; stroke: #555555; stroke-width: 1.5px; transition: all 0.3s; }
    .link.link--staff { stroke: #555555; stroke-dasharray: 4,4; }
    
    svg { width: 100vw; height: 100vh; cursor: grab; display: block; }
    
    .controls { 
      position: absolute; top: 90px; left: 20px; z-index: 11; 
      background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px;
      border: 1px solid #ddd;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; max-width: 250px; }
    button { 
      padding: 8px 12px; cursor: pointer; border: 1px solid #0d1251; 
      background: white; color: #0d1251; border-radius: 4px; font-size: 11px; font-weight: 600; transition: 0.3s;
    }
    button:hover { background: #0d1251; color: white; }
    .btn-primary { background: #0d1251; color: white; }

const nodeW = 165, nodeH = 50, colWidth = 260, vGap = 120, listY = 60, staffGap = 40;
const svg = d3.select("#chart");
const container = svg.append("g");
const zoom = d3.zoom().on("zoom", (e) => container.attr("transform", e.transform));
svg.call(zoom);

let root = d3.hierarchy(treeData);

function isLastBeforeLeaves(d) {
  if (!d.children) return false;
  return d.children.every(child => !child.children && !child._children);
}

function isInStaffBranch(d) {
  let current = d;
  while (current) {
    if (current.data.isStaffBranch) return true;
    current = current.parent;
  }
  return false;
}

function getBranchWidth(d) {
  if (isInStaffBranch(d) && d.depth === 1) return 0; 
  if (!d.children || d.children.length === 0 || isLastBeforeLeaves(d)) return colWidth;
  const sibs = d.children.filter(c => !isInStaffBranch(c));
  if (sibs.length === 0) return colWidth;
  return sibs.reduce((acc, curr) => acc + getBranchWidth(curr), 0);
}

function update() {
  const nodes = root.descendants();
  const links = root.links();

  nodes.forEach(d => {
    if (d.depth === 0) { d.x = 0; d.y = 0; }
    else if (d.data.isStaffBranch) {
      d.x = d.parent.x + nodeW + staffGap;
      d.y = d.parent.y;
    } 
    else {
      if (d.parent && isLastBeforeLeaves(d.parent)) {
        d.x = d.parent.x + 35;
        const idx = d.parent.children.indexOf(d);
        d.y = d.parent.y + vGap + (idx * listY);
      } 
      else {
        // --- LOGICA DE DESPLAZAMIENTO VERTICAL (JEFE DE CONTABILIDAD) ---
        let verticalOffset = 0;
        if (d.data.name === "Jefe de Contabilidad") {
            verticalOffset = -35; // Se eleva
        } else if (d.parent && d.parent.children.some(c => c.data.name === "Jefe de Contabilidad")) {
            verticalOffset = 15;  // Sus hermanos bajan un poco
        }

        d.y = d.parent.y + vGap + verticalOffset;
        
        const sibs = (d.parent.children || []).filter(s => !isInStaffBranch(s));
        const idx = sibs.indexOf(d);
        let leftOffset = 0;
        for (let i = 0; i < idx; i++) leftOffset += getBranchWidth(sibs[i]);
        const totalWidthAtLevel = sibs.reduce((acc, curr) => acc + getBranchWidth(curr), 0);
        d.x = d.parent.x + leftOffset - (totalWidthAtLevel / 2) + (getBranchWidth(d) / 2);
      }
    }
  });

  const link = container.selectAll(".link").data(links, d => d.target.id || (d.target.id = Math.random()));
  link.exit().remove();
  link.enter().append("path")
    .merge(link)
    .attr("class", d => isInStaffBranch(d.target) ? "link link--staff" : "link")
    .transition().duration(450)
    .attr("d", d => {
      const sX = d.source.x + nodeW/2, sY = d.source.y + nodeH;
      const tX = d.target.x + nodeW/2, tY = d.target.y;
      
      if (isInStaffBranch(d.target)) return `M${d.source.x + nodeW},${d.source.y + nodeH/2} H${d.target.x}`;
      
      if (isLastBeforeLeaves(d.source)) return `M${d.source.x + 20},${sY} V${d.target.y + nodeH/2} H${d.target.x}`;
      
      // Conectores ajustados para alturas variables (punto de quiebre fijo en vGap/2)
      return `M${sX},${sY} V${sY + (vGap/2)} H${tX} V${tY}`;
    });

  const node = container.selectAll(".node").data(nodes, d => d.id || (d.id = Math.random()));
  node.exit().remove();
  
  const nodeEnter = node.enter().append("g")
    .attr("transform", d => `translate(${d.parent ? d.parent.x : d.x},${d.parent ? d.parent.y : d.y})`)
    .on("click", (e, d) => {
      if (d.children) { d._children = d.children; d.children = null; }
      else if (d._children) {
        d.children = d._children;
        d._children = null;
        if (d.children) {
          d.children.forEach(child => {
            if (child.children) {
              child._children = child.children;
              child.children = null;
            }
          });
        }
      }
      update();
    });
  
  nodeEnter.append("rect").attr("width", nodeW).attr("height", nodeH);
  nodeEnter.append("text").attr("x", nodeW/2).attr("y", 0).attr("dy", "0");

  const nodeUpdate = nodeEnter.merge(node);
  nodeUpdate.attr("class", d => {
    let cls = isInStaffBranch(d) ? "node node--staff" : "node";
    if (d._children) cls += " node--collapsed";
    return cls;
  }).transition().duration(450).attr("transform", d => `translate(${d.x},${d.y})`);

  nodeUpdate.select("text").text(d => d.data.name).call(wrapText, nodeW - 15);
}

function wrapText(text, width) {
  text.each(function() {
    var text = d3.select(this),
        words = text.text().split(/\s+/).reverse(),
        word, line = [], lineNumber = 0, lineHeight = 1.1,
        y = text.attr("y"), x = text.attr("x"),
        dy = parseFloat(text.attr("dy") || 0),
        tspan = text.text(null).append("tspan").attr("x", x).attr("y", y).attr("dy", dy + "em");
    while (word = words.pop()) {
      line.push(word);
      tspan.text(line.join(" "));
      if (tspan.node().getComputedTextLength() > width) {
        line.pop(); tspan.text(line.join(" "));
        line = [word];
        tspan = text.append("tspan").attr("x", x).attr("y", y).attr("dy", ++lineNumber * lineHeight + dy + "em").text(word);
      }
    }
    const offset = (nodeH - ((lineNumber + 1) * 11)) / 2 + 8;
    text.attr("transform", `translate(0, ${offset})`);
  });
}

function filterLevel(l) {
  const process = (d) => {
    if (d.depth < l) {
      if (d._children) { d.children = d._children; d._children = null; }
      if (d.children) d.children.forEach(process);
    } 
    else {
      if (d.children) { d._children = d.children; d.children = null; }
    }
  };
  process(root);
  update();
  setTimeout(resetZoom, 500);
}

function expandAll() {
  const exp = (d) => {
    if (d._children) { d.children = d._children; d._children = null; }
    if (d.children) d.children.forEach(exp);
  };
  exp(root);
  update();
}

function resetZoom() {
  const scale = Math.min(window.innerWidth / 1600, 0.65);
  svg.transition().duration(800).call(
    zoom.transform, 
    d3.zoomIdentity.translate(window.innerWidth/2, 100).scale(scale)
  );
}

// INICIALIZACIÓN: NIVEL 2 POR DEFECTO
root.descendants().forEach(d => {
  if (d.depth >= 2 && d.children) {
    d._children = d.children;
    d.children = null;
  }
});

update();
resetZoom();
window.addEventListener('resize', resetZoom);
